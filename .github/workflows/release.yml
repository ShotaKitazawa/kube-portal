name: Create release when tag was pushed

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v3

      - name: Build manifests
        working-directory: manifests
        run: |
          kustomize edit set image __IMAGE__=ghcr.io/shotakitazawa/kube-portal:${{ github.ref_name }}
          kustomize build . > install.yaml

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: manifests/install.yaml
